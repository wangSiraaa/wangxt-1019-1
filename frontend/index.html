<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>共享单车调度系统</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <div class="role-selector">
    <h1>共享单车调度系统</h1>
    <p class="subtitle">城市共享单车智能调度管理平台</p>
    <div class="role-cards">
      <div class="role-card inspector" onclick="location.href=inspector.html">
        <div class="role-icon">巡检</div>
        <h2>巡检员</h2>
        <p>上报淤积点、查看任务列表</p>
      </div>
      <div class="role-card dispatcher" onclick="location.href=dispatcher.html">
        <div class="role-icon">调度</div>
        <h2>调度员</h2>
        <p>安排清运车、管理派车计划</p>
      </div>
      <div class="role-card manager" onclick="location.href=manager.html">
        <div class="role-icon">经理</div>
        <h2>运营经理</h2>
        <p>查看SLA、绩效报表、数据分析</p>
      </div>
    </div>
  </div>
</body>
</html>
